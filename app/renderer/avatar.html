<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Asuka Avatar</title>
    <link rel="stylesheet" href="avatar.css" />
    <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
          "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js",
          "@pixiv/three-vrm-core": "https://unpkg.com/@pixiv/three-vrm-core@3.4.5/lib/three-vrm-core.module.js",
          "@pixiv/three-vrm-animation": "https://unpkg.com/@pixiv/three-vrm-animation@3.4.5/lib/three-vrm-animation.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="avatar-shell">
      <header class="avatar-titlebar">
        <button id="chat-toggle-button" title="Abrir/Cerrar chat">Chat</button>
        <button id="close-button" title="Ocultar avatar">x</button>
      </header>

      <section class="avatar-stage">
        <div id="avatar-root" class="avatar-root" aria-label="Asuka avatar">
          <div id="wakeword-indicator" class="wakeword-indicator" aria-hidden="true"></div>
          <div id="vrm-layer" class="vrm-layer"></div>
          <div class="avatar-face" id="avatar-face">
            <div class="eyes">
              <span></span>
              <span></span>
            </div>
            <div class="mouth" id="mouth"></div>
          </div>
        </div>
      </section>
    </main>

    <script src="avatar-window.js" type="module"></script>
  </body>
</html>
