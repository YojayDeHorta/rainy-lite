<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modo Fiesta</title>
    <link rel="stylesheet" href="party.css" />
    <script async src="https://unpkg.com/es-module-shims@1.10.0/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.154.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.154.0/examples/jsm/",
          "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@2.0.0/lib/three-vrm.module.js",
          "@pixiv/three-vrm-core": "https://unpkg.com/@pixiv/three-vrm-core@3.4.5/lib/three-vrm-core.module.js",
          "@pixiv/three-vrm-animation": "https://unpkg.com/@pixiv/three-vrm-animation@3.4.5/lib/three-vrm-animation.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main class="party-shell">
      <div class="party-bg" aria-hidden="true">
        <span class="orb orb-a"></span>
        <span class="orb orb-b"></span>
        <span class="orb orb-c"></span>
        <span class="beam beam-a"></span>
        <span class="beam beam-b"></span>
      </div>

      <header class="party-header">
        <div>
          <p class="party-kicker">Asuka Desktop</p>
        </div>
        <button id="party-close-button" class="party-close-button" title="Salir del modo fiesta">Salir</button>
      </header>

      <section class="party-stage">
        <div id="avatar-root" class="party-avatar-root" aria-label="Avatar en modo fiesta">
          <div id="vrm-layer" class="party-vrm-layer"></div>
        </div>
      </section>

      <footer class="party-footer">
        <span id="party-status">Esperando musica...</span>
        <section class="party-player" aria-label="Controles de musica">
          <div class="party-track">
            <span class="party-track-label">Sonando ahora</span>
            <span id="party-track-title" class="party-track-title">Esperando musica...</span>
          </div>
          <div class="party-controls">
            <button id="party-prev-button" class="party-control-button" type="button" title="Cancion anterior" aria-label="Cancion anterior">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M5 5h2v14H5V5Zm14 1v12l-9-6 9-6Z"></path>
              </svg>
            </button>
            <button id="party-play-button" class="party-control-button party-control-button-primary" type="button" title="Pausar o reproducir" aria-label="Pausar o reproducir">
              <svg class="icon-pause" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M7 5h4v14H7V5Zm6 0h4v14h-4V5Z"></path>
              </svg>
              <svg class="icon-play" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 5v14l11-7L8 5Z"></path>
              </svg>
            </button>
            <button id="party-next-button" class="party-control-button" type="button" title="Siguiente cancion" aria-label="Siguiente cancion">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M17 5h2v14h-2V5ZM5 6v12l9-6-9-6Z"></path>
              </svg>
            </button>
          </div>
        </section>
      </footer>
    </main>

    <script src="party-window.js" type="module"></script>
  </body>
</html>
