<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Configuración</title>
  <link rel="stylesheet" href="settings.css">
</head>
<body>
  <button id="settings-close-button" class="settings-close-button" title="Cerrar configuración">x</button>
  <div class="settings-layout">
    <aside class="sidebar">
      <div class="brand">Configuración</div>
      <button class="tab-button active" data-tab="general">General</button>
      <button class="tab-button" data-tab="avatar">Avatar</button>
    </aside>
    <main class="content">
      
      <!-- General Tab -->
      <section id="tab-general" class="tab-content active">
        <h2>General</h2>
        <div class="setting-item">
          <div class="setting-label">
            <span>Modo Oscuro</span>
            <label class="switch">
              <input type="checkbox" id="theme-toggle">
              <span class="slider"></span>
            </label>
          </div>
        </div>
      </section>

      <!-- Avatar Tab -->
      <section id="tab-avatar" class="tab-content">
        <div class="settings-header">
          <h2>Ajustes del Avatar</h2>
          <button id="avatar-reset-button" class="btn-secondary">Reset</button>
        </div>
        <div class="setting-item">
          <div class="setting-label">Modelo del avatar</div>
          <select id="avatar-model-select" class="model-select"></select>
          <div class="model-actions">
            <button id="avatar-model-apply-button" class="btn-secondary">Aplicar modelo</button>
            <span id="avatar-model-status" class="model-status"></span>
          </div>
        </div>
        <div class="setting-item">
          <div class="setting-label">Horizontal <b id="avatar-x-value">0.00</b></div>
          <input id="avatar-x" type="range" min="-1.5" max="1.5" step="0.01" />
        </div>
        <div class="setting-item">
          <div class="setting-label">Vertical <b id="avatar-y-value">-0.45</b></div>
          <input id="avatar-y" type="range" min="-2.0" max="1.5" step="0.01" />
        </div>
        <div class="setting-item">
          <div class="setting-label">Escala <b id="avatar-scale-value">1.00</b></div>
          <input id="avatar-scale" type="range" min="0.4" max="2.0" step="0.01" />
        </div>
        <div class="setting-item">
          <div class="setting-label">Camara <b id="avatar-camera-value">3.40</b></div>
          <input id="avatar-camera" type="range" min="1.7" max="6.0" step="0.01" />
        </div>
        <div class="setting-item">
          <div class="setting-label">Luz <b id="avatar-light-value">0.65</b></div>
          <input id="avatar-light" type="range" min="0.15" max="1.4" step="0.01" />
        </div>
        <div class="setting-item">
          <div class="setting-label">Movimiento <b id="avatar-motion-value">1.00</b></div>
          <input id="avatar-motion" type="range" min="0" max="2" step="0.01" />
        </div>
      </section>
    </main>
  </div>
  <script src="settings.js"></script>
</body>
</html>
