<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="titlebar">
          <div class="brand">
            <span class="status-dot" id="status-dot"></span>
            <span>Chat</span>
          </div>
          <div class="window-actions">
            <button id="settings-button" title="Configurar avatar">⚙</button>
            <button id="pin-button" title="Siempre encima">Pin</button>
            <button id="min-button" title="Minimizar">_</button>
            <button id="close-button" title="Ocultar">x</button>
          </div>
        </header>

        <section class="chat-status">
          <div class="subtitle" id="subtitle">El avatar esta en una ventana separada. Pulsa Ctrl+Shift+R para hablar.</div>
        </section>

        <section class="avatar-settings hidden" id="avatar-settings">
          <div class="settings-header">
            <strong>Ajuste del avatar</strong>
            <button id="avatar-reset-button">Reset</button>
          </div>
          <label>
            <span>Horizontal <b id="avatar-x-value">0.00</b></span>
            <input id="avatar-x" type="range" min="-1.5" max="1.5" step="0.01" />
          </label>
          <label>
            <span>Vertical <b id="avatar-y-value">-0.45</b></span>
            <input id="avatar-y" type="range" min="-2.0" max="1.5" step="0.01" />
          </label>
          <label>
            <span>Escala <b id="avatar-scale-value">1.00</b></span>
            <input id="avatar-scale" type="range" min="0.4" max="2.0" step="0.01" />
          </label>
          <label>
            <span>Camara <b id="avatar-camera-value">3.40</b></span>
            <input id="avatar-camera" type="range" min="1.7" max="6.0" step="0.01" />
          </label>
          <label>
            <span>Luz <b id="avatar-light-value">0.65</b></span>
            <input id="avatar-light" type="range" min="0.15" max="1.4" step="0.01" />
          </label>
          <label>
            <span>Movimiento <b id="avatar-motion-value">1.00</b></span>
            <input id="avatar-motion" type="range" min="0" max="2" step="0.01" />
          </label>
        </section>

        <section class="chat" id="chat-log"></section>

        <footer class="composer">
          <button id="voice-button" class="voice-button" title="Hablar">Mic</button>
          <input id="message-input" type="text" placeholder="Dile algo a Asuka..." />
          <button id="send-button">Enviar</button>
        </footer>
      </section>
    </main>

    <script src="renderer.js" type="module"></script>
  </body>
</html>
