<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="panel">
        <header class="titlebar">
          <div class="brand">
            <span class="status-dot" id="status-dot"></span>
            <span>Chat</span>
            <button id="new-chat-button" class="brand-action" title="Nueva conversacion">+</button>
          </div>
          <div class="window-actions">
            <button id="settings-button" title="Configurar avatar">⚙</button>
            <button id="min-button" title="Minimizar">_</button>
            <button id="maximize-button" title="Agrandar chat">□</button>
            <button id="close-button" title="Ocultar">x</button>
          </div>
        </header>

        <section class="chat-status">
          <div class="subtitle" id="subtitle">El avatar esta en una ventana separada. Pulsa Ctrl+Shift+R para hablar.</div>
        </section>

        <section class="chat" id="chat-log"></section>

        <footer class="composer">
          <button id="voice-button" class="voice-button" title="Hablar">Mic</button>
          <input id="message-input" type="text" placeholder="Dile algo a Asuka..." />
          <button id="send-button">Enviar</button>
        </footer>
      </section>
    </main>

    <div id="new-chat-modal" class="modal-backdrop" hidden>
      <section class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="new-chat-title">
        <h2 id="new-chat-title">Empezar un nuevo chat?</h2>
        <p>La conversacion actual queda guardada en memoria, pero la ventana se limpiara para empezar de cero.</p>
        <div class="modal-actions">
          <button id="new-chat-cancel-button" type="button">Cancelar</button>
          <button id="new-chat-confirm-button" type="button" class="danger-action">Nuevo chat</button>
        </div>
      </section>
    </div>

    <script src="renderer.js" type="module"></script>
  </body>
</html>
